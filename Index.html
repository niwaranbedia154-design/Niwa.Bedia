यह लो, पूरा HTML + CSS कोड। इसे कॉपी करके रन करो।

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Underline</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        a{
            text-decoration: none;   /* नीचे की लाइन हटाने के लिए */
            color: blue;
            font-size: 28px;
        }

        a:hover{
            color: red;
        }
        .im{
          width: 50px;
          height: 50px;
          border-radius: 100%;
        }
    </style>
</head>
<body>

    <a href="https://www.instagram.com/niwaran_bedia" target="_blank">
        niwaran_bedia
    </a>
    <a href="https://www.instagram.com/niwaran_bedia" target="_blank">
    Instagram
</a><br/>
<img class="im" src="my.jpg"/>

</body>
</html>
